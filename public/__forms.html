<!doctype html>
<!--
  Static skeleton for Netlify build-time form detection only.
  Netlify's build bot cannot see forms rendered by the Next.js app at runtime,
  so every field the volunteer form submits must be mirrored here.
  Not linked anywhere and hidden from users.
-->
<html>
  <head>
    <meta charset="utf-8" />
    <title>Netlify form detection</title>
  </head>
  <body>
    <form name="volunteer" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="volunteer" />
      <input type="hidden" name="subject" />
      <input name="bot-field" />
      <input name="fullName" />
      <input name="email" type="email" />
      <input name="phone" />
      <input name="country" />
      <input name="skills" />
      <input name="interests" />
      <input name="availability" />
      <textarea name="motivation"></textarea>
    </form>
  </body>
</html>
